name: pcd_phision
description: "PhisIon - Phishing Detector via Digital Image Processing"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_barcode_scanning: ^0.12.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  flutter_dotenv: ^5.2.0
  image: ^4.2.0
  get_it: ^7.7.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  intl: ^0.19.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
